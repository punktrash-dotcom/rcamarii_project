name: nmd
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  location: ^5.0.3
  csv: ^6.0.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.15.0
  webview_flutter_wkwebview: ^3.13.0
  intl: ^0.20.2
  http: ^1.6.0
  html: ^0.15.5
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  open_filex: ^4.7.0
  two_dimensional_scrollables: ^0.2.0
  # Added for Financial Tracker Integration
  fl_chart: ^0.68.0
  file_picker: ^8.0.0
  printing: ^5.13.2
  pdf: ^3.11.1
  pdfrx: ^2.2.24
  flutter_native_splash: ^2.3.0  # Add dependency here
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  just_audio: ^0.10.5
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icons/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - lib/assets/advanced_sugarcane_farming_handbook.pdf
    - lib/assets/audio/
    - lib/assets/all_rice.pdf
    - lib/assets/all_sugarcane.docx
    - lib/assets/all_sugarcane.pdf
    - lib/assets/background.png
    - lib/assets/equipment.csv
    - lib/assets/images/
    - lib/assets/rcamarii_logo.png
    - lib/assets/fonts/
    - lib/assets/rcamarii_logo.png
    - lib/assets/splak_screen.jpg
    - lib/assets/sugarcane_master_ph.csv
    - lib/assets/supply_price.csv
    - lib/assets/tagalog_sugarcane_handbook.docx
    - lib/assets/visayan_sugarcane_handbook.docx
    - lib/assets/workdefs.csv

flutter_native_splash:
  color: "#16261C"
  image: lib/assets/images/rcamarii_logo_splash.png

  android_12:
    image: lib/assets/images/rcamarii_logo_splash.png
    color: "#16261C"

  ios: true
  ios_content_mode: scaleAspectFill

  web: true
  web_image_mode: cover
